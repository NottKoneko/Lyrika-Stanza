version: '3.8'

services:
  lyrics-bot:
    build: .
    container_name: discord_sync_bot
    restart: always
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./.env:/usr/src/app/.env
      - ./database.sqlite:/usr/src/app/database.sqlite